defaults:
  - _self_

project_name: coinrun_world_model_mini
seed: 123
device: auto
output_root: runs

env:
  name: coinrun
  distribution_mode: easy
  center_agent: true
  use_backgrounds: true
  render_mode: rgb_array
  num_actions: 15
  height: 64
  width: 64
  channels: 3
  splits:
    train:
      start_level: 0
      num_levels: 4
      total_frames: 512
    val:
      start_level: 10000
      num_levels: 2
      total_frames: 128
    test:
      start_level: 20000
      num_levels: 2
      total_frames: 128

data:
  root: data/procgen_coinrun_mini
  chunk_frames: 128
  episode_cap: 64
  action_mix:
    uniform: 0.50
    sticky: 0.35
    platformer_biased: 0.15
  sticky_keep_prob: 0.85
  platformer_probs:
    "7": 0.35
    "8": 0.25
    "4": 0.20
    "1": 0.10
    "5": 0.05
    other: 0.05

training:
  batch_size: 8
  num_workers: 0
  lr: 0.0003
  weight_decay: 0.01
  epochs: 1
  max_steps: 2
  log_every: 1
  val_every: 2
  save_every: 2
  amp: false

vqvae:
  codebook_size: 64
  code_dim: 32
  beta: 0.25
  hidden_channels: 64
  checkpoint: null

transformer:
  context_frames: 2
  train_horizon: 1
  latent_h: 8
  latent_w: 8
  layers: 2
  heads: 2
  width: 128
  dropout: 0.1
  max_seq_len: 256
  top_k: 20
  temperature: 1.0
  condition_actions: true
  checkpoint: null

eval:
  split: test
  clips: 4
  batch_size: 2
  rollout_steps: [1, 2, 4]
  context_ablations: [1, 2]
  fvd_clip_len: 4
  fvd_backend: rgb_motion
  probe_steps: 2
  probe_batch_size: 4
  counterfactual_actions: [4, 1, 7, 8]

demo:
  host: 127.0.0.1
  port: 8000
  split: test
  mock_if_missing: true
  show_context_frames: 2

reports:
  report_dir: outputs/report
  blog_dir: outputs/blog
  metrics_glob: runs/evaluate/*/metrics_summary.json
